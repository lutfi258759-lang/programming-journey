<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You Adidas Store</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#111;
    }

    .thankyou-box{
      background:white;
      padding:40px;
      border-radius:20px;
      text-align:center;
      width:400px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .thankyou-box h1{
      color:#000;
      margin-bottom:20px;
      font-size:32px;
    }

    .thankyou-box p{
      color:#555;
      line-height:1.8;
      font-size:16px;
      margin-bottom:12px;
    }

    .btn{
      display:inline-block;
      margin-top:20px;
      padding:12px 25px;
      background:#000;
      color:white;
      text-decoration:none;
      border-radius:10px;
      transition:0.3s;
    }

    .btn:hover{
      background:#333;
    }
  </style>
</head>
<body>

  <div class="thankyou-box">
    <h1>Terima Kasih kakak</h1>

    <p>Terima kasih sudah berbelanja di adidas store.</p>

    <p>
      Pesanan kamu sedang kami proses dan akan segera dikirim.

    </p>

    <p>
      Semoga produk yang kamu pesan nyaman dipakai 
    </p>

  </div>

</body>
</html>
